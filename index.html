<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Clock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2c2c2c;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }

  :root {
    --led:       11px;
    --gap:        3px;
    --grp-gap:    6px;
    --pad:        6px 8px 4px;
    --hdr-fs:     9px;
    --hdr-w:     26px;
    --hdr-mb:     4px;
    --time-fs:   10px;
    --time-mt:    4px;
    --radius:     4px;
    --boom-fs:   20px;
    --boom-sub:   7px;
  }

  :root.large {
    --led:       22px;
    --gap:        6px;
    --grp-gap:   12px;
    --pad:       12px 16px 8px;
    --hdr-fs:    18px;
    --hdr-w:     52px;
    --hdr-mb:     8px;
    --time-fs:   20px;
    --time-mt:    8px;
    --radius:     6px;
    --boom-fs:   40px;
    --boom-sub:  14px;
  }

  /* ---- widget shell ---- */
  .widget {
    background: #111;
    border: 1px solid #3a3a3a;
    border-radius: var(--radius);
    padding: var(--pad);
    box-shadow: inset 0 1px 3px #000, 0 2px 6px rgba(0,0,0,0.6);
    user-select: none;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  /* orange border when alarm is armed */
  .widget.armed {
    border-color: #663300;
    box-shadow: inset 0 1px 3px #000, 0 0 12px rgba(255,120,0,0.25);
  }

  /* ---- layout ---- */
  .header {
    display: flex;
    justify-content: space-around;
    margin-bottom: var(--hdr-mb);
    pointer-events: none;
  }

  .header span {
    color: #5577aa;
    font-size: var(--hdr-fs);
    letter-spacing: 0.5px;
    width: var(--hdr-w);
    text-align: center;
  }

  .grid {
    display: flex;
    gap: var(--grp-gap);
  }

  .group { display: flex; gap: var(--gap); }
  .col   { display: flex; flex-direction: column; gap: var(--gap); }

  /* ---- LEDs ---- */
  .led {
    width: var(--led);
    height: var(--led);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #0a1a3a, #020812);
    box-shadow: inset 0 0 3px rgba(0,0,40,0.8);
    transition: background 0.08s, box-shadow 0.08s;
    cursor: pointer;
  }

  .led.on {
    background: radial-gradient(circle at 35% 35%, #88aaff, #2244cc);
    box-shadow:
      inset 0 0 2px rgba(255,255,255,0.3),
      0 0 6px rgba(50,100,255,0.9),
      0 0 12px rgba(50,100,255,0.4);
  }

  /* orange ring = alarm bit set on this dot */
  .led.alm {
    box-shadow:
      inset 0 0 3px rgba(0,0,40,0.8),
      0 0 0 2px #994400,
      0 0 8px rgba(255,120,0,0.75);
  }

  .led.on.alm {
    box-shadow:
      inset 0 0 2px rgba(255,255,255,0.3),
      0 0 5px rgba(50,100,255,0.8),
      0 0 0 2px #ff8800,
      0 0 10px rgba(255,140,0,0.95),
      0 0 18px rgba(255,80,0,0.45);
  }

  .time {
    color: #3a5080;
    font-size: var(--time-fs);
    text-align: center;
    margin-top: var(--time-mt);
    letter-spacing: 1px;
    pointer-events: none;
  }

  /* ---- alarm animations ---- */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    10%     { transform: translateX(-9px) rotate(-1.5deg); }
    22%     { transform: translateX(9px)  rotate(1.5deg); }
    34%     { transform: translateX(-9px) rotate(-1.5deg); }
    46%     { transform: translateX(9px)  rotate(1.5deg); }
    58%     { transform: translateX(-9px) rotate(-1.5deg); }
    70%     { transform: translateX(9px)  rotate(1.5deg); }
    82%     { transform: translateX(-4px); }
    92%     { transform: translateX(4px); }
  }

  @keyframes flash {
    0%,100% { background: #111; }
    20%     { background: #c8d8ff; box-shadow: inset 0 0 0 #000, 0 0 40px #88aaff; }
    40%     { background: #111; }
    65%     { background: #d8e8ff; box-shadow: inset 0 0 0 #000, 0 0 60px #aabbff; }
    80%     { background: #111; }
  }

  .widget.shaking  { animation: shake 0.75s ease-in-out; }
  .widget.flashing { animation: flash 0.75s ease-in-out; }

  /* ---- BOOM overlay ---- */
  .boom {
    position: absolute;
    inset: 0;
    background: rgba(6,1,0,0.97);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .boom.show {
    opacity: 1;
    pointer-events: all;
  }

  @keyframes boom-pop {
    0%   { transform: scale(0.15) rotate(-8deg); opacity: 0; }
    55%  { transform: scale(1.3)  rotate(3deg);  opacity: 1; }
    72%  { transform: scale(0.9)  rotate(-1deg); }
    86%  { transform: scale(1.07); }
    100% { transform: scale(1)   rotate(0); }
  }

  @keyframes boom-glow {
    0%,100% { text-shadow: 0 0 8px #ff4400,  0 0 18px #cc2200; }
    50%     { text-shadow: 0 0 20px #ffbb00, 0 0 40px #ff6600, 0 0 70px #ff2200; }
  }

  @keyframes ring-out {
    0%   { transform: scale(0.4); opacity: 0.9; }
    100% { transform: scale(3.2); opacity: 0; }
  }

  .boom-ring {
    position: absolute;
    width: calc(var(--led) * 4);
    height: calc(var(--led) * 4);
    border-radius: 50%;
    border: 2px solid #ff6600;
    animation: ring-out 1.2s ease-out infinite;
  }
  .boom-ring:nth-child(2) { animation-delay: 0.4s; border-color: #ffaa00; }
  .boom-ring:nth-child(3) { animation-delay: 0.8s; border-color: #ff4400; }

  .boom-word {
    font-size: var(--boom-fs);
    font-weight: bold;
    color: #ff8800;
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
    animation:
      boom-pop  0.45s cubic-bezier(0.34,1.56,0.64,1) forwards,
      boom-glow 0.9s ease-in-out 0.45s infinite;
  }

  .boom-sub {
    font-size: var(--boom-sub);
    color: #442200;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  /* ---- size toggle ---- */
  .controls {
    display: flex;
    justify-content: center;
    margin-top: 14px;
    gap: 6px;
    align-items: center;
  }

  .controls label {
    color: #556;
    font-size: 10px;
    cursor: pointer;
  }

  .toggle-track {
    width: 28px;
    height: 14px;
    background: #222;
    border: 1px solid #444;
    border-radius: 7px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-track.on       { background: #1a2a50; border-color: #2244cc; }
  .toggle-track.on-alarm { background: #2a1400; border-color: #994400; }

  .toggle-thumb {
    width: 10px;
    height: 10px;
    background: #446;
    border-radius: 50%;
    position: absolute;
    top: 1px; left: 1px;
    transition: left 0.2s, background 0.2s;
  }

  .toggle-track.on .toggle-thumb {
    left: 15px;
    background: #5577dd;
    box-shadow: 0 0 4px rgba(50,100,255,0.6);
  }

  .toggle-track.on-alarm .toggle-thumb {
    left: 15px;
    background: #cc6600;
    box-shadow: 0 0 5px rgba(255,120,0,0.7);
  }

  .ctrl-sep { color: #333; font-size: 12px; margin: 0 2px; }
</style>
</head>
<body>
<div>
  <div class="widget" id="widget">
    <div class="header">
      <span>hr</span><span>min</span><span>sec</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="time"  id="time"></div>
    <div class="boom"  id="boom">
      <div class="boom-ring"></div>
      <div class="boom-ring"></div>
      <div class="boom-ring"></div>
      <div class="boom-word">BOOM!</div>
      <div class="boom-sub">click to dismiss</div>
    </div>
  </div>

  <div class="controls">
    <label>1×</label>
    <div class="toggle-track" id="szToggle" role="switch" aria-checked="false" tabindex="0">
      <div class="toggle-thumb"></div>
    </div>
    <label>2×</label>
    <span class="ctrl-sep">·</span>
    <label>alarm</label>
    <div class="toggle-track" id="almToggle" role="switch" aria-checked="false" tabindex="0">
      <div class="toggle-thumb"></div>
    </div>
  </div>
</div>

<script>
  const ROWS = 4, GROUPS = 3, CPG = 2;
  const widget = document.getElementById('widget');
  const boomEl = document.getElementById('boom');

  const leds = [];
  // alarmDots[g][c][r] — which bits the user has armed for the alarm
  const alarmDots = Array.from({length: GROUPS}, () =>
    Array.from({length: CPG}, () => Array(ROWS).fill(false)));

  let alarmActive = false;
  let lastFiredMs = 0;
  let lastVals = [0, 0, 0];

  /* ---- build LED grid ---- */
  const gridEl = document.getElementById('grid');
  for (let g = 0; g < GROUPS; g++) {
    const grpEl = document.createElement('div');
    grpEl.className = 'group';
    leds[g] = [];
    for (let c = 0; c < CPG; c++) {
      const colEl = document.createElement('div');
      colEl.className = 'col';
      leds[g][c] = [];
      for (let r = 0; r < ROWS; r++) {
        const led = document.createElement('div');
        led.className = 'led';
        led.addEventListener('click', (() => {
          const _g = g, _c = c, _r = r;
          return () => toggleAlarm(_g, _c, _r);
        })());
        colEl.appendChild(led);
        leds[g][c][r] = led;
      }
      grpEl.appendChild(colEl);
    }
    gridEl.appendChild(grpEl);
  }

  /* ---- alarm dot toggle ---- */
  function toggleAlarm(g, c, r) {
    if (alarmActive) return;
    alarmDots[g][c][r] = !alarmDots[g][c][r];
    const armed = alarmDots.flat(2).some(Boolean);
    widget.classList.toggle('armed', armed);
    renderLeds();
  }

  /* ---- render LEDs (time + alarm overlay) ---- */
  function renderLeds() {
    lastVals.forEach((val, g) => {
      [Math.floor(val / 10), val % 10].forEach((digit, c) => {
        for (let r = 0; r < ROWS; r++) {
          const on  = !!(digit & (1 << (ROWS - 1 - r)));
          const alm = alarmDots[g][c][r];
          leds[g][c][r].className = 'led' + (on ? ' on' : '') + (alm ? ' alm' : '');
        }
      });
    });
  }

  /* ---- tick ---- */
  function tick() {
    if (alarmActive) return;
    const now = new Date();
    lastVals = [now.getHours(), now.getMinutes(), now.getSeconds()];
    renderLeds();

    const [h, m, s] = lastVals;
    document.getElementById('time').textContent =
      `${pad(h)}:${pad(m)}:${pad(s)}`;

    checkAlarm(h, m, s);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  /* ---- alarm match: every dot's armed state must equal its lit state ---- */
  function checkAlarm(h, m, s) {
    if (!alarmEnabled || !alarmDots.flat(2).some(Boolean)) return;

    const vals = [h, m, s];
    let match = true;
    vals.forEach((val, g) => {
      [Math.floor(val / 10), val % 10].forEach((digit, c) => {
        for (let r = 0; r < ROWS; r++) {
          const isLit   = !!(digit & (1 << (ROWS - 1 - r)));
          const isArmed = alarmDots[g][c][r];
          if (isArmed !== isLit) match = false;
        }
      });
    });

    if (match && Date.now() - lastFiredMs > 65_000) {
      lastFiredMs = Date.now();
      fireAlarm();
    }
  }

  /* ---- alarm sequence: shake → flash → BOOM ---- */
  function fireAlarm() {
    alarmActive = true;

    runAnim(widget, 'shaking', 800, () =>
      runAnim(widget, 'flashing', 800, () => {
        boomEl.classList.add('show');
      })
    );
  }

  function runAnim(el, cls, ms, done) {
    el.classList.remove(cls);
    void el.offsetWidth;          // force reflow to restart
    el.classList.add(cls);
    setTimeout(() => { el.classList.remove(cls); done && done(); }, ms);
  }

  /* ---- dismiss BOOM ---- */
  boomEl.addEventListener('click', () => {
    boomEl.classList.remove('show');
    alarmActive = false;
    tick();
  });

  /* ---- alarm toggle ---- */
  const almToggle = document.getElementById('almToggle');
  let alarmEnabled = false;
  function setAlarm(on) {
    alarmEnabled = on;
    almToggle.classList.toggle('on-alarm', on);
    almToggle.setAttribute('aria-checked', on);
  }
  almToggle.addEventListener('click', () => setAlarm(!alarmEnabled));
  almToggle.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setAlarm(!alarmEnabled); }
  });

  /* ---- size toggle ---- */
  const szToggle = document.getElementById('szToggle');
  let large = false;
  function setSize(on) {
    large = on;
    document.documentElement.classList.toggle('large', on);
    szToggle.classList.toggle('on', on);
    szToggle.setAttribute('aria-checked', on);
  }
  szToggle.addEventListener('click', () => setSize(!large));
  szToggle.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setSize(!large); }
  });

  /* ---- start ---- */
  setSize(true);
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
