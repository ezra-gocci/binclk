<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Clock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2c2c2c;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }

  /* --- size tokens --- */
  :root {
    --led:     11px;
    --gap:      3px;
    --grp-gap:  6px;
    --pad:      6px 8px 4px;
    --hdr-fs:   9px;
    --hdr-w:   26px;
    --hdr-mb:   4px;
    --time-fs: 10px;
    --time-mt:  4px;
    --radius:   4px;
  }

  :root.large {
    --led:     22px;
    --gap:      6px;
    --grp-gap: 12px;
    --pad:     12px 16px 8px;
    --hdr-fs:  18px;
    --hdr-w:   52px;
    --hdr-mb:   8px;
    --time-fs: 20px;
    --time-mt:  8px;
    --radius:   6px;
  }

  .widget {
    background: #111;
    border: 1px solid #3a3a3a;
    border-radius: var(--radius);
    padding: var(--pad);
    box-shadow: inset 0 1px 3px #000, 0 2px 6px rgba(0,0,0,0.6);
    user-select: none;
  }

  .header {
    display: flex;
    justify-content: space-around;
    margin-bottom: var(--hdr-mb);
  }

  .header span {
    color: #5577aa;
    font-size: var(--hdr-fs);
    letter-spacing: 0.5px;
    width: var(--hdr-w);
    text-align: center;
  }

  .grid {
    display: flex;
    gap: var(--grp-gap);
  }

  .group {
    display: flex;
    gap: var(--gap);
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  .led {
    width: var(--led);
    height: var(--led);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #0a1a3a, #020812);
    box-shadow: inset 0 0 3px rgba(0,0,40,0.8);
    transition: background 0.08s, box-shadow 0.08s;
  }

  .led.on {
    background: radial-gradient(circle at 35% 35%, #88aaff, #2244cc);
    box-shadow:
      inset 0 0 2px rgba(255,255,255,0.3),
      0 0 6px rgba(50,100,255,0.9),
      0 0 12px rgba(50,100,255,0.4);
  }

  .time {
    color: #3a5080;
    font-size: var(--time-fs);
    text-align: center;
    margin-top: var(--time-mt);
    letter-spacing: 1px;
  }

  /* --- size toggle switch --- */
  .size-toggle {
    display: flex;
    justify-content: center;
    margin-top: 14px;
    gap: 6px;
    align-items: center;
  }

  .size-toggle label {
    color: #556;
    font-size: 10px;
    cursor: pointer;
  }

  .toggle-track {
    width: 28px;
    height: 14px;
    background: #222;
    border: 1px solid #444;
    border-radius: 7px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-track.active {
    background: #1a2a50;
    border-color: #2244cc;
  }

  .toggle-thumb {
    width: 10px;
    height: 10px;
    background: #446;
    border-radius: 50%;
    position: absolute;
    top: 1px;
    left: 1px;
    transition: left 0.2s, background 0.2s;
  }

  .toggle-track.active .toggle-thumb {
    left: 15px;
    background: #5577dd;
    box-shadow: 0 0 4px rgba(50,100,255,0.6);
  }
</style>
</head>
<body>

<div>
  <div class="widget">
    <div class="header">
      <span>hr</span>
      <span>min</span>
      <span>sec</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="time" id="time"></div>
  </div>

  <div class="size-toggle">
    <label id="lbl-s">1×</label>
    <div class="toggle-track" id="toggle" role="switch" aria-checked="false" tabindex="0">
      <div class="toggle-thumb"></div>
    </div>
    <label id="lbl-l">2×</label>
  </div>
</div>

<script>
  const ROWS = 4, GROUPS = 3, CPG = 2;
  const grid = document.getElementById('grid');
  const leds = [];

  for (let g = 0; g < GROUPS; g++) {
    const group = document.createElement('div');
    group.className = 'group';
    leds[g] = [];
    for (let c = 0; c < CPG; c++) {
      const col = document.createElement('div');
      col.className = 'col';
      leds[g][c] = [];
      for (let r = 0; r < ROWS; r++) {
        const led = document.createElement('div');
        led.className = 'led';
        col.appendChild(led);
        leds[g][c][r] = led;
      }
      group.appendChild(col);
    }
    grid.appendChild(group);
  }

  function tick() {
    const now = new Date();
    const vals = [now.getHours(), now.getMinutes(), now.getSeconds()];
    vals.forEach((val, g) => {
      [Math.floor(val / 10), val % 10].forEach((digit, c) => {
        for (let r = 0; r < ROWS; r++) {
          const bit = 1 << (ROWS - 1 - r);
          leds[g][c][r].className = 'led' + ((digit & bit) ? ' on' : '');
        }
      });
    });
    const [h, m, s] = vals.map(v => String(v).padStart(2, '0'));
    document.getElementById('time').textContent = `${h}:${m}:${s}`;
  }

  tick();
  setInterval(tick, 1000);

  // size toggle
  const toggle = document.getElementById('toggle');
  let large = false;

  function setSize(on) {
    large = on;
    document.documentElement.classList.toggle('large', on);
    toggle.classList.toggle('active', on);
    toggle.setAttribute('aria-checked', on);
  }

  toggle.addEventListener('click', () => setSize(!large));
  toggle.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setSize(!large); }
  });
</script>
</body>
</html>
