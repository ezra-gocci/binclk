<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Clock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2c2c2c;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }

  .widget {
    background: #111;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    padding: 6px 8px 5px;
    box-shadow: inset 0 1px 3px #000, 0 2px 6px rgba(0,0,0,0.6);
    user-select: none;
  }

  .header {
    display: flex;
    justify-content: space-around;
    margin-bottom: 4px;
  }

  .header span {
    color: #5577aa;
    font-size: 9px;
    letter-spacing: 0.5px;
    width: 26px;
    text-align: center;
  }

  .grid {
    display: flex;
    gap: 3px;
  }

  .group {
    display: flex;
    gap: 3px;
  }

  .group + .group {
    margin-left: 3px;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .led {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #0a1a3a, #020812);
    box-shadow: inset 0 0 3px rgba(0,0,40,0.8);
    transition: background 0.08s, box-shadow 0.08s;
  }

  .led.on {
    background: radial-gradient(circle at 35% 35%, #88aaff, #2244cc);
    box-shadow:
      inset 0 0 2px rgba(255,255,255,0.3),
      0 0 6px rgba(50,100,255,0.9),
      0 0 12px rgba(50,100,255,0.4);
  }

  .time {
    color: #3a5080;
    font-size: 10px;
    text-align: center;
    margin-top: 4px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <span>hr</span>
    <span>min</span>
    <span>sec</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="time" id="time"></div>
</div>

<script>
  const ROWS = 4;
  const GROUPS = 3;
  const COLS_PER_GROUP = 2;

  // Build DOM: 3 groups × 2 cols × 4 rows
  const grid = document.getElementById('grid');
  const leds = [];

  for (let g = 0; g < GROUPS; g++) {
    const group = document.createElement('div');
    group.className = 'group';
    leds[g] = [];
    for (let c = 0; c < COLS_PER_GROUP; c++) {
      const col = document.createElement('div');
      col.className = 'col';
      leds[g][c] = [];
      for (let r = 0; r < ROWS; r++) {
        const led = document.createElement('div');
        led.className = 'led';
        col.appendChild(led);
        leds[g][c][r] = led;
      }
      group.appendChild(col);
    }
    grid.appendChild(group);
  }

  function tick() {
    const now = new Date();
    const vals = [now.getHours(), now.getMinutes(), now.getSeconds()];

    vals.forEach((val, g) => {
      const tens = Math.floor(val / 10);
      const ones = val % 10;
      [tens, ones].forEach((digit, c) => {
        for (let r = 0; r < ROWS; r++) {
          const bit = 1 << (ROWS - 1 - r); // row 0 = bit 8, row 3 = bit 1
          leds[g][c][r].className = 'led' + ((digit & bit) ? ' on' : '');
        }
      });
    });

    const h = String(vals[0]).padStart(2, '0');
    const m = String(vals[1]).padStart(2, '0');
    const s = String(vals[2]).padStart(2, '0');
    document.getElementById('time').textContent = `${h}:${m}:${s}`;
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
